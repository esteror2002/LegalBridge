<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>פגישות וידאו | Legal Bridge</title>

  <!-- Bootstrap -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

  <!-- Icons -->
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

  <!-- Page CSS -->
  <link rel="stylesheet" href="../css/video-meetings.css">
</head>
<body>

<!-- Background Animation -->
<div class="bg-animation">
  <div class="floating-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
    <div class="shape shape-5"></div>
  </div>
</div>

<div class="layout-container">

  <!-- Sidebar -->
  <aside class="sidebar">

    <div class="sidebar-header">
      <div class="profile-section">
        <div class="profile-avatar">
          <i class="bi bi-person-circle"></i>
        </div>
        <h2 id="greeting">שלום</h2>
      </div>

      <div class="header-actions">
        <button class="logout-btn" onclick="logout()">
          <i class="bi bi-box-arrow-right"></i>
          התנתקות
        </button>
      </div>
    </div>

    <nav class="lawyer-options">
      <ul>
        <li>
          <a href="lawyer-home.html" class="nav-item">
            <div class="nav-icon"><i class="bi bi-house"></i></div>
            <span>עמוד הבית</span>
            <div class="nav-arrow"><i class="bi bi-chevron-left"></i></div>
          </a>
        </li>

        <li>
          <a href="lawyer-profile.html" class="nav-item">
            <div class="nav-icon"><i class="bi bi-person"></i></div>
            <span>אזור אישי</span>
            <div class="nav-arrow"><i class="bi bi-chevron-left"></i></div>
          </a>
        </li>

        <li>
          <a href="lawyer-calendar.html" class="nav-item">
            <div class="nav-icon"><i class="bi bi-calendar-week"></i></div>
            <span>יומן אישי</span>
            <div class="nav-arrow"><i class="bi bi-chevron-left"></i></div>
          </a>
        </li>

        <li>
          <a href="video-meetings.html" class="nav-item active">
            <div class="nav-icon"><i class="bi bi-camera-video"></i></div>
            <span>פגישות וידאו</span>
            <div class="nav-arrow"><i class="bi bi-chevron-left"></i></div>
          </a>
        </li>

        <li>
          <a href="lawyer-cases.html" class="nav-item primary-nav">
            <div class="nav-icon"><i class="bi bi-folder"></i></div>
            <span>ניהול תיקים</span>
            <div class="nav-arrow"><i class="bi bi-chevron-left"></i></div>
          </a>
        </li>

        <li>
          <a href="lawyer-requests.html" class="nav-item">
            <div class="nav-icon"><i class="bi bi-envelope"></i></div>
            <span>דואר</span>
            <div class="nav-arrow"><i class="bi bi-chevron-left"></i></div>
          </a>
        </li>

        <li>
          <a href="clients-list.html" class="nav-item">
            <div class="nav-icon"><i class="bi bi-people"></i></div>
            <span>צפייה בלקוחות</span>
            <div class="nav-arrow"><i class="bi bi-chevron-left"></i></div>
          </a>
        </li>
      </ul>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Header -->
    <div class="content-header">
      <h1 class="page-title">
        <i class="bi bi-camera-video"></i>
        פגישות וידאו
      </h1>
      <p class="page-subtitle">ניהול פגישות עתידיות והיסטוריית פגישות</p>
    </div>
  
    <!-- Action -->
    <div class="text-center mb-4">
      <button class="btn btn-primary btn-lg rounded-pill px-4" onclick="openCreateModal()">
        <i class="bi bi-plus-circle me-2"></i>
        הוספת פגישת וידאו
      </button>
    </div>
    
    <div class="d-flex gap-3 mb-3 justify-content-center">
        <select id="sort-select" class="form-select w-auto">
          <option value="date">מיון לפי תאריך</option>
          <option value="client">מיון לפי לקוח</option>
        </select>
      
        <input
          id="search-input"
          class="form-control w-25"
          placeholder="חיפוש לפי שם לקוח"
        />
      </div>
      
    <!-- Upcoming -->
    <div class="profile-card">
      <div class="card-header">
        <div class="header-icon">
          <i class="bi bi-clock"></i>
        </div>
        <div class="header-content">
          <h3>פגישות עתידיות</h3>
          <p>פגישות שטרם התקיימו</p>
        </div>
      </div>
  
      <div class="card-body">
        <div id="upcoming-meetings" class="row g-4"></div>
      </div>
    </div>
  
    <!-- Past -->
    <div class="profile-card mt-4">
      <div class="card-header">
        <div class="header-icon">
          <i class="bi bi-clock-history"></i>
        </div>
        <div class="header-content">
          <h3>היסטוריית פגישות</h3>
          <p>פגישות שהסתיימו או בוטלו</p>
        </div>
      </div>
  
      <div class="card-body">
        <div id="past-meetings" class="row g-3"></div>
      </div>
    </div>
  
  </main>
  
</div>

<!-- ===== Create Meeting Modal (חובה!) ===== -->
<div id="create-modal" class="modal">
  <div class="modal-box">
    <h3>יצירת פגישת וידאו</h3>

    <form id="video-meeting-form">
      <label>לקוח</label>
      <select id="client-select" required></select>

      <label>נושא</label>
      <input type="text" id="meeting-title" required>

      <label>תאריך ושעה</label>
      <input type="datetime-local" id="meeting-date" required>

      <label>משך</label>
      <select id="meeting-duration">
        <option value="30">30 דקות</option>
        <option value="60">60 דקות</option>
      </select>

      <label>הערות</label>
      <textarea id="meeting-notes"></textarea>

      <div class="modal-actions">
        <button type="button" class="secondary" onclick="closeCreateModal()">
          ביטול
        </button>
        <button type="submit" class="primary">
          צור פגישה
        </button>
      </div>
    </form>
  </div>
</div>

<script src="../js/video-meetings.js"></script>
</body>
</html>
